<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found · dGTL Sentinel</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=24 height=24 rx=6 fill=%22%236428A8%22/></svg>" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/animations.css" />
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 20% 20%, var(--purple-50), var(--surface-page) 55%);
  }
  .notfound-wrap { max-width: 460px; text-align: center; padding: var(--space-7); }
  .notfound-mark {
    width: 64px; height: 64px; margin: 0 auto var(--space-6);
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--purple-400), var(--purple-700));
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-md);
  }
  .notfound-code { font-size: 4rem; font-weight: 800; letter-spacing: -0.03em; color: var(--purple-600); line-height: 1; margin-bottom: var(--space-3); }
  .notfound-title { font-size: var(--text-lg); margin-bottom: var(--space-2); }
  .notfound-desc { color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-7); line-height: var(--leading-relaxed); }
  .notfound-actions { display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="notfound-wrap animate-fade-up">
  <div class="notfound-mark">
    <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3 4.5 6v6c0 5 3.2 7.7 7.5 9 4.3-1.3 7.5-4 7.5-9V6L12 3Z"/>
    </svg>
  </div>
  <div class="notfound-code">404</div>
  <h1 class="notfound-title">This screen isn't in the workflow</h1>
  <p class="notfound-desc">The page you're looking for doesn't exist, may have been moved, or the case/link you followed is no longer valid.</p>
  <div class="notfound-actions">
    <a href="dashboard.html" class="btn btn--primary">Return to Command Centre</a>
    <a href="case-queue.html" class="btn btn--secondary">Go to Case Queue</a>
  </div>
</div>
</body>
</html>
